{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "orchestration-service.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestration-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  DATABASE_URL: {{ include "orchestration-service.databaseUrl" . | quote }}
  REDIS_URL: {{ include "orchestration-service.redisUrl" . | quote }}
  RABBITMQ_URL: {{ include "orchestration-service.rabbitmqUrl" . | quote }}
{{- end }}
