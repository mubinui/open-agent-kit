apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "orchestration-service.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestration-service.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  MAX_CONCURRENT_SESSIONS: {{ .Values.config.maxConcurrentSessions | quote }}
  AGENT_TIMEOUT_SECONDS: {{ .Values.config.agentTimeoutSeconds | quote }}
  API_WORKERS: {{ .Values.config.apiWorkers | quote }}
  CHROMADB_PATH: "/app/data/chromadb"
  OTEL_SERVICE_NAME: "orchestration-service"
  METRICS_PORT: "9090"
  API_PORT: "8000"
