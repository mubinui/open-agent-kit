{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-agent-kit.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "open-agent-kit.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  DATABASE_URL: {{ include "open-agent-kit.databaseUrl" . | quote }}
  REDIS_URL: {{ include "open-agent-kit.redisUrl" . | quote }}
  RABBITMQ_URL: {{ include "open-agent-kit.rabbitmqUrl" . | quote }}
{{- end }}
