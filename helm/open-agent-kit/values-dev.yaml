# Development environment values
replicaCount: 1

image:
  tag: "dev"
  pullPolicy: Always

config:
  logLevel: "DEBUG"
  maxConcurrentSessions: 10

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false

ingress:
  enabled: true
  hosts:
    - host: oak-dev.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: oak-dev-tls
      hosts:
        - oak-dev.example.com

postgresql:
  primary:
    persistence:
      size: 5Gi
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

redis:
  master:
    persistence:
      size: 1Gi
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 250m

rabbitmq:
  persistence:
    size: 2Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

chromadb:
  persistence:
    size: 2Gi
