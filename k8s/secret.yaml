apiVersion: v1
kind: Secret
metadata:
  name: orchestration-secrets
  namespace: orchestration
  labels:
    app: orchestration-service
type: Opaque
stringData:
  # LLM Provider API Keys (base64 encoded in production)
  OPENROUTER_API_KEY: "your-openrouter-api-key-here"
  OPENAI_API_KEY: "your-openai-api-key-here"
  
  # Database Credentials
  DATABASE_USER: "orchestrator"
  DATABASE_PASSWORD: "orchestrator_pass"
  DATABASE_URL: "postgresql://orchestrator:orchestrator_pass@postgres-service:5432/orchestration"
  
  # Redis Configuration
  REDIS_URL: "redis://redis-service:6379/0"
  
  # RabbitMQ Credentials
  RABBITMQ_USER: "orchestrator"
  RABBITMQ_PASSWORD: "orchestrator_pass"
  RABBITMQ_URL: "amqp://orchestrator:orchestrator_pass@rabbitmq-service:5672/"
  
  # JWT Secret for API Authentication
  JWT_SECRET_KEY: "change-this-to-a-secure-random-string"
  
  # Encryption Key for credentials at rest
  ENCRYPTION_KEY: "change-this-to-a-secure-32-byte-key"

---
# Note: In production, use external secret management like:
# - Kubernetes External Secrets Operator
# - AWS Secrets Manager
# - Azure Key Vault
# - HashiCorp Vault
# - Sealed Secrets
#
# Example with External Secrets Operator:
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: orchestration-secrets
#   namespace: orchestration
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: SecretStore
#   target:
#     name: orchestration-secrets
#   data:
#   - secretKey: OPENROUTER_API_KEY
#     remoteRef:
#       key: orchestration/openrouter-api-key
