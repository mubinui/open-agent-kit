apiVersion: v1
kind: Secret
metadata:
  name: open-agent-kit-secrets
  namespace: open-agent-kit
  labels:
    app: open-agent-kit
type: Opaque
stringData:
  # LLM Provider API Keys (base64 encoded in production)
  OPENROUTER_API_KEY: "your-openrouter-api-key-here"
  OPENAI_API_KEY: "your-openai-api-key-here"
  
  # Database Credentials
  DATABASE_USER: "oak"
  DATABASE_PASSWORD: "oak_pass"
  DATABASE_URL: "postgresql://oak:oak_pass@postgres-service:5432/oak"
  
  # Redis Configuration
  REDIS_URL: "redis://redis-service:6379/0"
  
  # RabbitMQ Credentials
  RABBITMQ_USER: "oak"
  RABBITMQ_PASSWORD: "oak_pass"
  RABBITMQ_URL: "amqp://oak:oak_pass@rabbitmq-service:5672/"
  
  # JWT Secret for API Authentication
  JWT_SECRET_KEY: "change-this-to-a-secure-random-string"
  
  # Encryption Key for credentials at rest
  ENCRYPTION_KEY: "change-this-to-a-secure-32-byte-key"
  
  # Keycloak Configuration (sensitive)
  KEYCLOAK_SERVER_URL: "http://keycloak-service:8080"
  KEYCLOAK_CLIENT_ID: "frontend-client"
  KEYCLOAK_CLIENT_SECRET: "your-client-secret-here"
  KEYCLOAK_ADMIN_CLIENT_ID: "admin-client"
  KEYCLOAK_ADMIN_CLIENT_SECRET: "your-admin-client-secret-here"
  
  # External Services Configuration (sensitive URLs)
  SERVICE1_BASE_URL: "http://service1-service:8001"
  SERVICE2_BASE_URL: "http://service2-service:8002"

---
# Note: In production, use external secret management like:
# - Kubernetes External Secrets Operator
# - AWS Secrets Manager
# - Azure Key Vault
# - HashiCorp Vault
# - Sealed Secrets
#
# Example with External Secrets Operator:
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: open-agent-kit-secrets
#   namespace: open-agent-kit
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: SecretStore
#   target:
#     name: open-agent-kit-secrets
#   data:
#   - secretKey: OPENROUTER_API_KEY
#     remoteRef:
#       key: oak/openrouter-api-key
