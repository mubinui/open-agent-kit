apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestration-config
  namespace: orchestration
  labels:
    app: orchestration-service
data:
  # Application Settings
  LOG_LEVEL: "INFO"
  MAX_CONCURRENT_SESSIONS: "100"
  AGENT_TIMEOUT_SECONDS: "300"
  
  # Database Configuration
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "orchestration"
  
  # Redis Configuration
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # RabbitMQ Configuration
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"
  
  # Vector Database Configuration
  CHROMADB_PATH: "/app/data/chromadb"
  QDRANT_URL: "http://qdrant-service:6333"
  QDRANT_COLLECTION: "knowledge_base"
  
  # RAG Pipeline Configuration
  RAG_PIPELINE_BASE_URL: "http://rag-pipeline-service:8003"
  RAG_PIPELINE_TIMEOUT: "60"
  RAG_PIPELINE_ENABLED: "true"
  RAG_PIPELINE_DEFAULT_COLLECTION: "knowledge_base"
  
  # Observability
  OTEL_SERVICE_NAME: "orchestration-service"
  METRICS_PORT: "9090"
  
  # API Configuration
  API_PORT: "8000"
  API_WORKERS: "4"
  
  # Keycloak Configuration (non-sensitive)
  KEYCLOAK_ENABLED: "true"
  KEYCLOAK_REALM: "demo-realm"
  KEYCLOAK_VERIFY_AUDIENCE: "true"
  KEYCLOAK_JWKS_CACHE_TTL: "3600"
  
  # External Services Configuration (non-sensitive)
  SERVICE1_ENABLED: "true"
  SERVICE1_API_PATH: "/api/v1"
  SERVICE1_TIMEOUT: "30"
  SERVICE2_ENABLED: "true"
  SERVICE2_API_PATH: "/api/v1"
  SERVICE2_TIMEOUT: "30"
