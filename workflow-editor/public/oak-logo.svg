<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Open Agent Kit logo">
  <defs>
    <linearGradient id="oakTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.55" stop-color="#059669"/>
      <stop offset="1" stop-color="#065f46"/>
    </linearGradient>
    <radialGradient id="oakSheen" cx="0.25" cy="0.18" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Tile -->
  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#oakTile)"/>
  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#oakSheen)"/>
  <rect x="3.5" y="3.5" width="57" height="57" rx="14.5" fill="none" stroke="#ffffff" stroke-opacity="0.14"/>

  <!-- Oak-as-workflow mark: a tree whose branches end in agent nodes -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none">
    <path stroke-width="4" d="M32 52 V36"/>
    <path stroke-width="3.4" d="M32 38 C32 31.5 27.5 29.5 22 27.5"/>
    <path stroke-width="3.4" d="M32 38 C32 31.5 36.5 29.5 42 27.5"/>
    <path stroke-width="3.4" d="M32 36 V23"/>
    <path stroke-width="3.4" d="M26.5 54 H37.5" opacity="0.55"/>
  </g>
  <g fill="#ffffff">
    <circle cx="32" cy="18.5" r="4.6"/>
    <circle cx="20" cy="26" r="4"/>
    <circle cx="44" cy="26" r="4"/>
  </g>
</svg>
