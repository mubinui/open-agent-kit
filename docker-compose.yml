# Open Agent Kit (OAK) — Docker Compose
#
# Default:      docker compose up            -> single container, SQLite (zero config)
# Postgres:     docker compose --profile postgres up
# Vector DB:    docker compose --profile qdrant up
# Everything:   docker compose --profile postgres --profile qdrant --profile redis up

services:
  # Open Agent Kit — API + Studio UI in one container
  oak:
    build:
      context: .
      dockerfile: Dockerfile
    image: open-agent-kit:latest
    container_name: open-agent-kit
    ports:
      - "${APP_PORT:-8000}:8000" # API + Studio UI — override with APP_PORT
      - "${METRICS_PORT:-9090}:9090" # Prometheus metrics
    environment:
      # LLM Provider (OpenRouter by default; any LiteLLM-supported provider works)
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - LLM_MODEL=${LLM_MODEL:-openai/gpt-oss-20b}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OR_SITE_URL=${OR_SITE_URL:-}
      - OR_APP_NAME=${OR_APP_NAME:-Open Agent Kit}

      # Database — SQLite on the data volume by default.
      # With the postgres profile: DATABASE_URL=postgresql://oak:oak_pass@postgres:5432/oak
      - DATABASE_URL=${DATABASE_URL:-}
      - OAK_AUTO_MIGRATE=${OAK_AUTO_MIGRATE:-true}

      # Optional initial admin account (created on first boot if no users exist)
      - OAK_ADMIN_USERNAME=${OAK_ADMIN_USERNAME:-}
      - OAK_ADMIN_PASSWORD=${OAK_ADMIN_PASSWORD:-}

      # Optional Redis cache (redis profile)
      - REDIS_URL=${REDIS_URL:-}

      # Optional Qdrant vector store (qdrant profile)
      - QDRANT_URL=${QDRANT_URL:-}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-knowledge_base}

      # Optional external RAG pipeline service
      - RAG_PIPELINE_BASE_URL=${RAG_PIPELINE_BASE_URL:-}
      - RAG_PIPELINE_ENABLED=${RAG_PIPELINE_ENABLED:-false}
      - RAG_PIPELINE_API_KEY=${RAG_PIPELINE_API_KEY:-}
      - RAG_PIPELINE_DEFAULT_COLLECTION=${RAG_PIPELINE_DEFAULT_COLLECTION:-knowledge_base}

      # Application
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - APP_PORT=8000
      - FRONTEND_URL=${FRONTEND_URL:-*}

      # Optional Keycloak SSO (disabled by default)
      - KEYCLOAK_ENABLED=${KEYCLOAK_ENABLED:-false}
      - KEYCLOAK_SERVER_URL=${KEYCLOAK_SERVER_URL:-}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}

      # Observability
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=open-agent-kit
    volumes:
      - ./configs:/app/configs # agent/workflow/tool definitions (editable)
      - oak_data:/app/data # SQLite DB, sessions, deployments
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL — production database (optional)
  postgres:
    image: postgres:16-alpine
    container_name: oak-postgres
    profiles: ["postgres"]
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-oak}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-oak_pass}
      - POSTGRES_DB=${POSTGRES_DB:-oak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis — caching layer (optional)
  redis:
    image: redis:7-alpine
    container_name: oak-redis
    profiles: ["redis"]
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant — vector database for RAG (optional)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: oak-qdrant
    profiles: ["qdrant"]
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/readyz"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  oak_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  default:
    name: oak-network
    driver: bridge
